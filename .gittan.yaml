steps:
  - name: install
    description: Install dependencies from lockfile
    image: gittan/node:22
    run: pnpm install --frozen-lockfile
    cache:
      - node_modules

  - name: typecheck
    description: Type-check TypeScript
    image: gittan/node:22
    run: pnpm typecheck
    needs: [install]

  - name: test
    description: Run unit tests
    image: gittan/node:22
    run: pnpm test
    needs: [install]

gated:
  - main
